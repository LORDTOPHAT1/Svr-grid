<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SVR Grid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700;0,800;1,700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="svr-grid-styles.css" />
</head>
<body>

  <div class="corner-accent top-left"></div>
  <div class="corner-accent top-right"></div>

  <header class="site-header">
    <div class="header-inner">
      <div class="header-logo">
        <span class="logo-svr">SVR</span>
        <span class="logo-grid">GRID</span>
        <div class="logo-bar"></div>
      </div>
      <div class="header-meta">
        <span class="header-label">QUALIFYING ORDER GENERATOR</span>
      </div>
    </div>
  </header>

  <main class="main-layout">

    <!-- INPUT PANEL -->
    <section class="input-panel">
      <div class="panel-header">
        <div class="panel-title-wrap">
          <div class="panel-accent-bar"></div>
          <h2 class="panel-title">BUILD GRID</h2>
        </div>
        <span class="panel-subtitle">TYPE A DRIVER NAME TO SEARCH</span>
      </div>

      <div class="search-wrap">
        <div class="search-input-row">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input
            type="text"
            id="driverSearch"
            class="driver-search-input"
            placeholder="Search driver..."
            autocomplete="off"
          />
        </div>
        <div class="search-dropdown" id="searchDropdown"></div>
      </div>

      <div class="grid-list" id="gridList">
        <!-- Slots rendered by JS -->
      </div>

      <div class="action-row">
        <button class="btn-clear" id="btnClear">CLEAR ALL</button>
        <button class="btn-generate" id="btnGenerate">GENERATE GRID</button>
      </div>
    </section>

    <!-- PREVIEW PANEL -->
    <section class="preview-panel" id="previewPanel">
      <div class="panel-header">
        <div class="panel-title-wrap">
          <div class="panel-accent-bar"></div>
          <h2 class="panel-title">PREVIEW</h2>
        </div>
        <div class="preview-controls">
          <button class="btn-icon" id="btnPlay" disabled>
            <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
          </button>
          <button class="btn-icon" id="btnReset" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
          </button>
          <button class="btn-icon" id="btnFullscreen" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
          </button>
        </div>
      </div>
      <div class="preview-stage" id="previewStage">
        <div class="preview-placeholder">
          <div class="placeholder-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
            </svg>
          </div>
          <p>ADD DRIVERS AND HIT GENERATE</p>
        </div>
      </div>
    </section>

  </main>

  <!-- FULLSCREEN OVERLAY -->
  <div class="fullscreen-overlay" id="fullscreenOverlay">
    <div class="fs-stage" id="fsStage"></div>
    <div class="fs-controls">
      <button class="btn-icon fs-btn" id="fsPlay">
        <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
      </button>
      <button class="btn-icon fs-btn" id="fsClose">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>

  <footer class="site-footer">
    <span>FOR THE SVR COMMUNITY &nbsp;·&nbsp; CRAFTED BY LORD TOPHAT &nbsp;·&nbsp; BUILT WITH CLAUDE BY ANTHROPIC</span>
  </footer>

  <script src="svr-grid-data.js"></script>
  <script src="svr-grid-app.js"></script>

</body>
</html>
